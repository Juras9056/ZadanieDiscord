services:
  - type: web
    name: discord-clone
    env: python
    buildCommand: "./build.sh"
    startCommand: "daphne config.asgi:application --port $PORT --bind 0.0.0.0"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: discord-clone-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: discord-clone-redis
          type: redis
          property: connectionString

  - type: redis
    name: discord-clone-redis
    plan: free

databases:
  - name: discord-clone-db
    plan: free
