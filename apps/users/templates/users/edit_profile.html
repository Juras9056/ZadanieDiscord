{% extends "base.html" %}

{% block title %}Edytuj profil{% endblock %}

{% block content %}
<div class="p-4" style="max-width:500px">
  <h4 class="mb-4 fw-bold">Edytuj profil</h4>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
      <div class="mb-3">
        <label class="form-label fw-semibold">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
      </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Zapisz zmiany</button>
    <a href="{% url 'users:profile' request.user.username %}" class="btn btn-secondary ms-2">Anuluj</a>
  </form>
</div>
{% endblock %}
